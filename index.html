            color: #f0f8ff;

            transition: 0.1s;
            box-shadow: 0 4px 0 #0b1a2a;
            border: 1px solid #3f6585;
            display: inline-flex;
            align-items: center;
            gap: 8px;

        .btn-corregir { background: #2a5a3a; border-color: #4a8a5a; }
        .btn-corregir:hover { background: #3a7a4a; }

        .filtro-nivel {

            align-items: center;
            gap: 12px;
            background: #102433;
            padding: 0.3rem 1.2rem 0.3rem 1.5rem;
            border-radius: 60px;
            border: 1px solid #3a5a6a;
            flex-wrap: wrap;

            color: #b0cce0;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
        }
        .filtro-nivel select {

            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }
        .filtro-nivel select:focus { border-color: #d4b06a; }

        .pregunta-card {
            background: rgba(16, 32, 46, 0.8);
            border-radius: 28px;
            padding: 1.5rem 1.8rem;
            margin-bottom: 1.3rem;

            flex-wrap: wrap;

            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 700;
            border: 1px solid #5a7a5a;

            color: #b5d6b5;

        .dificultad.intermedio { background: #2a3a3a; color: #b0d0d0; border-color: #4a7a7a; }
        .enunciado {
            color: #e8f2fc;
            font-size: 1.05rem;
            line-height: 1.6;
            margin: 0.4rem 0 1rem 0;
        }
        .opciones {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            padding-left: 0.2rem;
        }
        .opcion {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 18px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.1s;
        }
        .opcion:hover { background: #1e3a4e; border-color: #5a8a9a; }
        .opcion input[type="radio"] {
            appearance: none;
            width: 18px;
            height: 18px;
            border: 2px solid #6a8a9a;
            border-radius: 50%;
            margin-top: 0.2rem;
            flex-shrink: 0;
            background: #0d1f2f;
            transition: 0.1s;
        }
        .opcion input[type="radio"]:checked {
            border-color: #d4b06a;
            background: #d4b06a;
            box-shadow: 0 0 0 3px #1a2f44;
        }
        .opcion input[type="radio"]:checked::after {
            content: "✓";
            position: relative;
            display: block;
            color: #0b1a2e;
            font-weight: 700;
            font-size: 13px;
            left: 2px;
            top: -2px;
        }
        .opcion label {
            color: #dae6f5;
            font-size: 0.98rem;
            line-height: 1.5;
            cursor: pointer;
            flex: 1;
        }
        .feedback {
            margin-top: 0.7rem;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            background: #101f2e;
            border-left: 6px solid #4a6a8a;
            color: #c0d8ee;
            display: none;
            font-weight: 500;
        }
        .feedback.mostrar { display: block; }
        .feedback.correcta { border-left-color: #6bc46b; background: #1a3a2a; color: #b8e6b8; }
        .feedback.incorrecta { border-left-color: #d46a6a; background: #3a1e1e; color: #f0c0c0; }
        .stats {
            background: #0b1a2a;
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            display: inline-flex;
            gap: 28px;
            flex-wrap: wrap;
            color: #d4e6ff;
            font-weight: 500;
            border: 1px solid #3a5a6a;
        }
        .stats span { color: #e5c27a; }
        .footer-examen {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-top: 2.2rem;
            gap: 18px;
        }
        .contador-visibles {
            color: #8aacbe;
            font-size: 0.9rem;
            padding: 0.3rem 1.2rem;
            background: #0d1f2f;
            border-radius: 40px;
            border: 1px solid #2a4a5a;
        }
        @media (max-width: 700px) {
            .examen-wrapper { padding: 1rem 0.8rem; }
            .pregunta-card { padding: 1.2rem 1rem; }
            h1 { font-size: 1.5rem; padding-left: 0.8rem; }
            .opcion { padding: 0.5rem 0.8rem; }
            .filtro-nivel { padding: 0.3rem 0.8rem; }
        }
    </style>
</head>

<script>

        const preguntas = [

            // ================================================================

            // ================================================================

            // Básicas (1-10)
            { id: 1, nivel: 'basico', enunciado: '¿Cuál es la unidad mínima de instrucción y la mínima de combate según el manual?', opciones: ['La sección', 'La compañía', 'El pelotón', 'La escuadra'], correcta: 2 },

            { id: 5, nivel: 'basico', enunciado: 'La escolta de bandera está integrada por:', opciones: ['Tres elementos y un comandante', 'Cuatro elementos y un policía segundo', 'Cinco elementos y un oficial', 'Seis elementos y un suboficial'], correcta: 1 },
            { id: 6, nivel: 'basico', enunciado: 'El paso redoblado de la escolta de bandera tiene una cadencia de:', opciones: ['100 pasos por minuto', '110 pasos por minuto', '120 pasos por minuto', '130 pasos por minuto'], correcta: 2 },
            { id: 7, nivel: 'basico', enunciado: 'El paso acelerado de la escolta de bandera tiene una cadencia de:', opciones: ['120 pasos por minuto', '125 pasos por minuto', '130 pasos por minuto', '140 pasos por minuto'], correcta: 2 },

            // Intermedias (11-18)
            { id: 11, nivel: 'intermedio', enunciado: 'La voz preventiva para la formación "REUNIRSE" es seguida por la voz ejecutiva:', opciones: ['"FUEGO"', '"YA"', '"AHORA"', '"EJECUTIVO"'], correcta: 1 },
            { id: 12, nivel: 'intermedio', enunciado: 'En la formación "alinearse por la derecha", el hombre base:', opciones: ['Gira la cabeza a la derecha', 'Mantiene la vista al frente', 'Empuña la mano izquierda', 'Se coloca en el centro'], correcta: 1 },
            { id: 13, nivel: 'intermedio', enunciado: 'La sección está organizada por:', opciones: ['Dos pelotones', 'Tres pelotones', 'Cuatro pelotones', 'Cinco pelotones'], correcta: 1 },
            { id: 14, nivel: 'intermedio', enunciado: 'La formación de la sección en "línea en dos filas" se emplea para:', opciones: ['Marchas', 'Reuniones', 'Revistas', 'Desfiles'], correcta: 2 },

            // Avanzadas (19-28) - NUEVAS
            { id: 19, nivel: 'avanzado', enunciado: 'Durante una ceremonia de honores a la bandera, el comandante nota que un elemento no dirige la vista al lábaro durante el toque de "Bandera". Según el protocolo, debe:', opciones: ['Ignorar la falta', 'Sancionar al elemento después de la ceremonia', 'Corregir la falta en el momento de forma discreta', 'Reportar al superior sin actuar'], correcta: 2 },
            { id: 20, nivel: 'avanzado', enunciado: 'La escolta de bandera recibe la voz preventiva "ATENCIÓN ESCOLTA COLUMNA POR DOS". La formación resultante es:', opciones: ['Una fila con la bandera al centro', 'Dos filas con la bandera en primera fila', 'Tres filas con la bandera al frente', 'Cuatro filas con la bandera en el centro'], correcta: 1 },

            // ================================================================

            // Básicas (29-38)

            { id: 134, nivel: 'intermedio', enunciado: 'El análisis de resultados de un operativo debe contener:', opciones: ['Solo los errores', 'Resumen, objetivos, resultados, diferencias y análisis razonado', 'Solo los aciertos', 'Solo el presupuesto'], correcta: 1 },
            { id: 135, nivel: 'intermedio', enunciado: 'En la dirección de servicios coordinados, el uso de medios de transmisión y enlace permite:', opciones: ['Aislar a las unidades', 'Establecer contacto con órganos superiores y unidades subordinadas', 'Ignorar a los subordinados', 'Centralizar toda la información'], correcta: 1 },

            // Avanzadas (136-140) - NUEVAS
            { id: 136, nivel: 'avanzado', enunciado: 'Durante un operativo de seguridad, el responsable operativo debe distinguir entre:', opciones: ['Mando operativo y mando técnico', 'Estrategia y táctica', 'Vigilancia y patrullaje', 'Prevención y reacción'], correcta: 0 },
            { id: 137, nivel: 'avanzado', enunciado: 'En la elaboración de una Orden de Servicio, el uso de abreviaturas debe ser:', opciones: ['Extenso', 'Reglamentario o de uso común conocido', 'Prohibido siempre', 'Utilizado solo en anexos'], correcta: 1 },
            { id: 138, nivel: 'avanzado', anunciado: 'Un operativo de seguridad que requiere la concurrencia de múltiples unidades debe establecer claramente:', opciones: ['Solo el horario', 'La estructura de mando: quién ostenta la responsabilidad operativa y quién el mando técnico', 'Solo el presupuesto', 'Solo el número de elementos'], correcta: 1 },
            { id: 139, nivel: 'avanzado', enunciado: 'En la dirección de servicios, la capacidad de previsión es consecuencia de:', opciones: ['La improvisación', 'La información proporcionada y su correcto uso', 'La intuición', 'La experiencia únicamente'], correcta: 1 },
            { id: 140, nivel: 'avanzado', enunciado: 'El informe de resultados de un operativo debe incluir un análisis crítico para:', opciones: ['Culpar a los subordinados', 'Subsanar deficiencias y corregir desviaciones para futuros servicios', 'Justificar gastos', 'Ocultar errores'], correcta: 1 }
        ];

        // Estado
        let respuestasUsuario = new Array(140).fill(null);
        let nivelFiltro = 'todos';

        const container = document.getElementById('preguntasContainer');
        const respondidasSpan = document.getElementById('respondidasCount');
        const aciertosSpan = document.getElementById('aciertosCount');
        const calificacionSpan = document.getElementById('calificacion');
        const contadorVisibles = document.getElementById('contadorVisibles');
        const filtroSelect = document.getElementById('filtroNivel');

        function renderPreguntas() {
            let html = '';
            preguntas.forEach((p, idx) => {
                const nivelClass = p.nivel === 'avanzado' ? 'avanzado' : (p.nivel === 'intermedio' ? 'intermedio' : '');
                const letras = ['a', 'b', 'c', 'd'];
                const oculto = (nivelFiltro !== 'todos' && p.nivel !== nivelFiltro) ? 'oculto' : '';
                html += `<div class="pregunta-card ${oculto}" data-index="${idx}" data-nivel="${p.nivel}">
                    <div class="preg-header">
                        <span class="num-preg">${idx+1}.</span>
                        <span class="dificultad ${nivelClass}">${p.nivel}</span>
                    </div>
                    <div class="enunciado">${p.enunciado}</div>
                    <div class="opciones">`;
                p.opciones.forEach((opc, optIndex) => {
                    const checked = (respuestasUsuario[idx] === optIndex) ? 'checked' : '';
                    html += `<div class="opcion">
                        <input type="radio" name="pregunta_${idx}" value="${optIndex}" ${checked} id="p${idx}_${optIndex}">
                        <label for="p${idx}_${optIndex}">${letras[optIndex]}) ${opc}</label>
                    </div>`;
                });
                html += `</div>
                    <div class="feedback" id="feedback_${idx}"></div>
                </div>`;
            });
            container.innerHTML = html;

            // eventos radio
            document.querySelectorAll('.opcion input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', function(e) {
                    const preguntaDiv = this.closest('.pregunta-card');
                    const idx = parseInt(preguntaDiv.dataset.index);
                    const val = parseInt(this.value);
                    respuestasUsuario[idx] = val;
                    const fb = document.getElementById(`feedback_${idx}`);
                    if (fb) {
                        fb.classList.remove('mostrar', 'correcta', 'incorrecta');
                        fb.style.display = 'none';
                        fb.innerHTML = '';
                    }
                    actualizarEstadisticas();
                });
            });

            // restaurar feedbacks si ya existen
            for (let i = 0; i < preguntas.length; i++) {
                if (respuestasUsuario[i] !== null) {
                    const fb = document.getElementById(`feedback_${i}`);
                    if (fb) {
                        const esCorrecta = (respuestasUsuario[i] === preguntas[i].correcta);
                        fb.style.display = 'block';
                        fb.classList.add('mostrar');
                        fb.classList.add(esCorrecta ? 'correcta' : 'incorrecta');
                        const letras = ['a','b','c','d'];
                        const correctaLetra = letras[preguntas[i].correcta];
                        const respuestaLetra = letras[respuestasUsuario[i]];
                        fb.innerHTML = esCorrecta
                            ? `<strong>✅ Correcto.</strong>`
                            : `<strong>❌ Incorrecto.</strong> Correcta: ${correctaLetra}. Tu respuesta: ${respuestaLetra}.`;
                    }
                }
            }

            // actualizar contador de visibles
            const visibles = document.querySelectorAll('.pregunta-card:not(.oculto)').length;
            contadorVisibles.textContent = `Mostrando: ${visibles} preguntas`;
            actualizarEstadisticas();
        }

        function actualizarEstadisticas() {
            const totalVisibles = document.querySelectorAll('.pregunta-card:not(.oculto)').length;
            const respondidas = respuestasUsuario.filter((r, idx) => {
                const card = document.querySelector(`.pregunta-card[data-index="${idx}"]`);
                return r !== null && card && !card.classList.contains('oculto');
            }).length;
            respondidasSpan.textContent = respondidas;

            let correctas = 0;
            for (let i = 0; i < preguntas.length; i++) {
                const card = document.querySelector(`.pregunta-card[data-index="${i}"]`);
                if (respuestasUsuario[i] !== null && card && !card.classList.contains('oculto')) {
                    if (respuestasUsuario[i] === preguntas[i].correcta) correctas++;
                }
            }
            aciertosSpan.textContent = correctas;
            const calif = totalVisibles > 0 ? Math.round((correctas / totalVisibles) * 100) : 0;
            calificacionSpan.textContent = totalVisibles > 0 ? `${calif}%` : '-';
        }

        function corregirExamen() {
            for (let i = 0; i < preguntas.length; i++) {
                const fb = document.getElementById(`feedback_${i}`);
                if (!fb) continue;
                const card = document.querySelector(`.pregunta-card[data-index="${i}"]`);
                if (card && card.classList.contains('oculto')) continue;

                const respuesta = respuestasUsuario[i];
                if (respuesta === null) {
                    fb.style.display = 'block';
                    fb.classList.add('mostrar', 'incorrecta');
                    fb.innerHTML = `<strong>⚠️ Sin responder.</strong>`;
                    continue;
                }
                const esCorrecta = (respuesta === preguntas[i].correcta);
                fb.style.display = 'block';
                fb.classList.add('mostrar');
                fb.classList.remove('correcta', 'incorrecta');
                fb.classList.add(esCorrecta ? 'correcta' : 'incorrecta');
                const letras = ['a','b','c','d'];
                const correctaLetra = letras[preguntas[i].correcta];
                const respuestaLetra = letras[respuesta];
                fb.innerHTML = esCorrecta
                    ? `<strong>✅ Correcto.</strong>`
                    : `<strong>❌ Incorrecto.</strong> Correcta: ${correctaLetra}. Tu respuesta: ${respuestaLetra}.`;
            }
            actualizarEstadisticas();
        }

        function resetExamen() {
            respuestasUsuario = new Array(140).fill(null);
            document.querySelectorAll('.opcion input[type="radio"]').forEach(radio => radio.checked = false);
            document.querySelectorAll('.feedback').forEach(fb => {
                fb.style.display = 'none';
                fb.classList.remove('mostrar', 'correcta', 'incorrecta');
                fb.innerHTML = '';
            });
            actualizarEstadisticas();
        }

        function aplicarFiltro() {
            nivelFiltro = filtroSelect.value;
            document.querySelectorAll('.pregunta-card').forEach(card => {
                const nivel = card.dataset.nivel;
                if (nivelFiltro === 'todos' || nivel === nivelFiltro) {
                    card.classList.remove('oculto');
                } else {
                    card.classList.add('oculto');
                }
            });
            actualizarEstadisticas();
            const visibles = document.querySelectorAll('.pregunta-card:not(.oculto)').length;
            contadorVisibles.textContent = `Mostrando: ${visibles} preguntas`;
        }

        // Eventos
        document.getElementById('btnCorregir').addEventListener('click', corregirExamen);
        document.getElementById('btnReset').addEventListener('click', resetExamen);
        filtroSelect.addEventListener('change', aplicarFiltro);

        renderPreguntas();
    })();
</script>
</body>
</html>
